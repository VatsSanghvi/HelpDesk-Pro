{% extends 'base_auth.html' %}
{% block title %}Reset Password{% endblock %}
{% block body %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-box">🔑</div>
      <h4>Reset Password</h4>
      <p>Enter your email to receive a reset link</p>
    </div>
    <form method="POST">{% csrf_token %}
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@company.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>
    <div style="text-align:center;margin-top:16px;"><a href="{% url 'login' %}" style="font-size:13px;color:var(--primary);">← Back to Login</a></div>
  </div>
</div>
{% endblock %}
