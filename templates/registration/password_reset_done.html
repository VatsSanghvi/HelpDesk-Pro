{% extends 'base_auth.html' %}
{% block title %}Email Sent{% endblock %}
{% block body %}
<div class="login-page">
  <div class="login-card" style="text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">📧</div>
    <h4 style="font-weight:700;margin-bottom:8px;">Check your email</h4>
    <p style="color:var(--text-muted);font-size:13px;">We've sent a password reset link to your email address. Check your inbox (and spam folder).</p>
    <a href="{% url 'login' %}" class="btn btn-primary btn-block mt-3">Back to Login</a>
  </div>
</div>
{% endblock %}
