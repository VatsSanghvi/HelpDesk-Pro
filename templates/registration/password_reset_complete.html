{% extends 'base_auth.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block body %}
<div class="login-page">
  <div class="login-card" style="text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">✅</div>
    <h4 style="font-weight:700;margin-bottom:8px;">Password Updated!</h4>
    <p style="color:var(--text-muted);font-size:13px;">Your password has been set. You can now log in with your new password.</p>
    <a href="{% url 'login' %}" class="btn btn-primary btn-block mt-3">Login Now</a>
  </div>
</div>
{% endblock %}
