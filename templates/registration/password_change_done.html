{% extends 'base_auth.html' %}
{% block title %}Password Changed{% endblock %}
{% block topbar_title %}Password Changed{% endblock %}
{% block body %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card" style="text-align:center;padding:40px;">
      <div style="font-size:40px;margin-bottom:12px;">✅</div>
      <h5 style="font-weight:700;">Password updated successfully!</h5>
      <p style="color:var(--text-muted);font-size:13px;">Your new password is now active.</p>
      <a href="{% url 'profile' request.user.id %}" class="btn btn-primary mt-2">Back to Profile</a>
    </div>
  </div>
</div>
{% endblock %}
